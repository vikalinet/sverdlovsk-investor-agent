# Pre-commit конфигурация
# Установка: pip install pre-commit && pre-commit install
# Запуск вручную: pre-commit run --all-files

repos:
  # Стандартные хуки pre-commit
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Удалить пробелы в конце строк
      - id: end-of-file-fixer
        name: Добавить перевод строки в конце файла
      - id: check-yaml
        name: Проверка YAML синтаксиса
        args: ['--unsafe']
      - id: check-json
        name: Проверка JSON синтаксиса
      - id: check-toml
        name: Проверка TOML синтаксиса
      - id: check-merge-conflict
        name: Проверка конфликтов слияния
      - id: check-added-large-files
        name: Проверка больших файлов
        args: ['--maxkb=5000']
      - id: detect-private-key
        name: Обнаружение приватных ключей
      - id: check-case-conflict
        name: Проверка конфликтов регистра

  # Форматирование кода (Black)
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        name: Black форматирование
        language_version: python3.11
        args: [--line-length=100]

  # Сортировка импортов (isort)
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Сортировка импортов
        args: ["--profile", "black", "--line-length=100"]

  # Линтинг (flake8)
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Flake8 линтинг
        args: [
          --max-line-length=100,
          --extend-ignore=E203,W503,
          --exclude=.venv,build,dist,*.egg-info,
          --per-file-ignores=__init__.py:F401
        ]
        additional_dependencies: []

  # Проверка типов (mypy)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: Проверка типов mypy
        additional_dependencies:
          - types-requests==2.31.0.20240125
          - types-aiohttp==3.9.1.20240206
          - types-PyYAML==6.0.12.12
          - types-python-docx==1.1.0.20240114
          - pydantic==2.5.3
          - pydantic-settings==2.1.0
        args: [
          --ignore-missing-imports,
          --disallow-untyped-defs,
          --disallow-incomplete-defs,
          --check-untyped-defs,
          --no-implicit-optional,
          --warn-redundant-casts,
          --warn-unused-ignores
        ]
        exclude: ^(tests/|web/static/|docs/)

  # Безопасность (bandit)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: Проверка безопасности bandit
        args: ["-r", "-ll", "-ii", "--exclude", "tests/*"]
        additional_dependencies: []

  # Проверка зависимостей
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.2
    hooks:
      - id: python-safety-dependencies-check
        name: Проверка уязвимостей зависимостей
        files: requirements.*\.txt$

  # Секреты (detect-secrets)
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Обнаружение секретов
        args: ['--baseline', '.secrets.baseline']
        exclude: .secrets.baseline|\.env.*|requirements.*\.txt$
